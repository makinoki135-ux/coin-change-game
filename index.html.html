<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>釣銭計算ゲーム</title>
<style>
  :root {
    --bg: #1e1e2f;
    --surface: #2a2a40;
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
    --coin-silver: #cbd5e1;
    --coin-copper: #b45309;
    --coin-gold: #fbbf24;
    --bill: #bae6fd;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background-color: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background-color: var(--surface);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--border);
    padding-bottom: 1rem;
    margin-bottom: 1.5rem;
  }

  .title { font-size: 1.25rem; font-weight: 700; }
  .score { font-size: 1.1rem; font-weight: bold; color: var(--success); }

  .problem-section {
    text-align: center;
    margin-bottom: 2rem;
    background: rgba(0,0,0,0.2);
    padding: 1.5rem;
    border-radius: 12px;
  }

  .problem-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .problem-price { font-size: 3rem; font-weight: 800; color: var(--primary); letter-spacing: 2px; }
  .problem-price span { font-size: 1.5rem; font-weight: 600; }

  .selection-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
    padding: 0.5rem 0;
  }

  .current-sum { font-size: 1.5rem; font-weight: 700; color: var(--warning); }
  
  .coins-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .coin {
    aspect-ratio: 1/1;
    border-radius: 50%;
    border: none;
    font-size: 1.1rem;
    font-weight: 700;
    color: #1e293b;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    user-select: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .coin.type-bill {
    aspect-ratio: 2/1;
    border-radius: 8px;
    grid-column: span 2;
  }

  /* 通貨ごとの色分け */
  .v-10000, .v-5000, .v-1000 { background: var(--bill); }
  .v-500, .v-100, .v-50, .v-1 { background: var(--coin-silver); }
  .v-10, .v-5 { background: var(--coin-copper); }
  .v-5 { border: 4px solid var(--coin-gold); background: transparent; color: var(--coin-gold); }
  .v-50 { border: 4px solid var(--coin-silver); background: transparent; color: var(--coin-silver); }

  .coin:active { transform: scale(0.95); }
  .coin.selected {
    transform: translateY(-5px);
    box-shadow: 0 0 0 3px var(--primary), 0 8px 15px rgba(99, 102, 241, 0.4);
    filter: brightness(1.2);
  }
  .coin.selected::after {
    content: '✓';
    position: absolute;
    top: -5px; right: -5px;
    background: var(--primary);
    color: white;
    width: 20px; height: 20px;
    border-radius: 50%;
    font-size: 12px;
    display: flex; align-items: center; justify-content: center;
  }

  .actions {
    display: flex;
    gap: 1rem;
    margin-top: auto;
  }

  .btn {
    flex: 1;
    padding: 1rem;
    border: none;
    border-radius: 8px;
    font-size: 1.1rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    color: white;
  }

  .btn-reset { background: var(--border); }
  .btn-reset:hover { background: #475569; }
  
  .btn-submit { background: var(--primary); }
  .btn-submit:hover { background: var(--primary-hover); }
  .btn-submit:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }

  /* モーダル */
  .modal-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    display: flex; justify-content: center; align-items: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    z-index: 100; padding: 1rem;
  }
  .modal-overlay.active { opacity: 1; pointer-events: auto; }

  .modal-content {
    background: var(--surface);
    padding: 2rem;
    border-radius: 12px;
    width: 100%; max-width: 400px;
    text-align: center;
    transform: translateY(20px);
    transition: transform 0.3s;
  }
  .modal-overlay.active .modal-content { transform: translateY(0); }

  .modal-title { font-size: 1.5rem; margin-bottom: 1rem; font-weight: bold; }
  .modal-title.success { color: var(--success); }
  .modal-title.error { color: var(--danger); }

  .result-details {
    background: rgba(0,0,0,0.2);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.5rem;
    text-align: left;
    font-size: 0.95rem;
  }
  .result-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; }
  .result-row:last-child { margin-bottom: 0; }
  .result-answer { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); color: var(--warning); }

  .btn-next { background: var(--primary); width: 100%; }
  
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: var(--danger); color: white; padding: 0.75rem 1.5rem;
    border-radius: 8px; font-weight: bold; font-size: 0.9rem;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 200;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">釣銭計算ゲーム</div>
    <div class="score">連続正解: <span id="score-display">0</span></div>
  </div>

  <div class="mode-selector" style="text-align: center; margin-bottom: 1.5rem; background: rgba(0,0,0,0.2); padding: 0.5rem; border-radius: 8px;">
    <label style="margin-right: 1.5rem; cursor: pointer; font-weight: bold;">
      <input type="radio" name="difficulty" value="normal" checked id="mode-normal"> 通常モード
    </label>
    <label style="cursor: pointer; font-weight: bold;">
      <input type="radio" name="difficulty" value="easy" id="mode-easy"> イージーモード
    </label>
  </div>

  <div class="problem-section">
    <div class="problem-label">お会計</div>
    <div class="problem-price"><span id="target-price">0</span><span>円</span></div>
  </div>

  <div class="selection-info">
    <div>支払い額</div>
    <div class="current-sum"><span id="current-sum">0</span>円</div>
  </div>

  <div class="coins-grid" id="coins-container">
    <!-- 貨幣がここに生成されます -->
  </div>

  <div class="actions">
    <button class="btn btn-reset" id="btn-reset">リセット</button>
    <button class="btn btn-submit" id="btn-submit">確定</button>
  </div>
</div>

<div class="modal-overlay" id="result-modal">
  <div class="modal-content">
    <div class="modal-title" id="modal-title">結果</div>
    <div class="result-details" id="result-details">
      <!-- 結果詳細 -->
    </div>
    <button class="btn btn-next" id="btn-next">次へ</button>
  </div>
</div>

<div class="toast" id="toast">代金が足りません</div>

<script>
/**
 * 釣銭計算ゲーム ロジック
 */

// 通貨の定義
const COIN_TYPES = [10000, 5000, 1000, 500, 100, 50, 10, 5, 1];

// ゲーム状態
const state = {
  score: 0,
  targetPrice: 0,
  walletCoins: [], // 手持ちの貨幣配列
  selectedIndices: new Set(), // 選択された貨幣のインデックス
  minChangeCoins: Infinity, // 正解（最小お釣り枚数）
  validAnswers: [], // 正解となる支払いパターンの配列
  mode: 'normal'
};

// DOM要素
const elPrice = document.getElementById('target-price');
const elSum = document.getElementById('current-sum');
const elScore = document.getElementById('score-display');
const elCoinsContainer = document.getElementById('coins-container');
const elBtnReset = document.getElementById('btn-reset');
const elBtnSubmit = document.getElementById('btn-submit');
const elModal = document.getElementById('result-modal');
const elModalTitle = document.getElementById('modal-title');
const elResultDetails = document.getElementById('result-details');
const elBtnNext = document.getElementById('btn-next');
const elToast = document.getElementById('toast');
const elModeNormal = document.getElementById('mode-normal');
const elModeEasy = document.getElementById('mode-easy');

/**
 * 初期化
 */
function init() {
  state.score = 0;
  updateScore();
  generateProblem();
  setupEventListeners();
  
  elModeNormal.addEventListener('change', () => changeMode('normal'));
  elModeEasy.addEventListener('change', () => changeMode('easy'));
}

function changeMode(mode) {
  if (state.mode !== mode) {
    state.mode = mode;
    state.score = 0;
    updateScore();
    generateProblem();
  }
}

/**
 * 金額のお釣り枚数を計算する
 */
function calculateChangeCoinCount(changeAmount) {
  if (changeAmount === 0) return 0;
  let count = 0;
  let remaining = changeAmount;
  for (const coin of COIN_TYPES) {
    if (remaining >= coin) {
      const num = Math.floor(remaining / coin);
      count += num;
      remaining -= num * coin;
    }
  }
  return count;
}

/**
 * 手持ちのすべての支払い組み合わせを全探索し、正解群を特定する
 */
function solveProblem(price, wallet) {
  let minChangeCount = Infinity;
  let bestCombinations = [];

  const n = wallet.length;
  // 1〜(2^n - 1) までのビット全探索
  // ※候補数が多すぎると重くなるため、問題生成で制限する（最大15枚程度）
  const maxMask = 1 << n;
  
  for (let mask = 1; mask < maxMask; mask++) {
    let sum = 0;
    const currentCombination = [];
    
    for (let i = 0; i < n; i++) {
      if ((mask & (1 << i)) !== 0) {
        sum += wallet[i];
        currentCombination.push(wallet[i]);
      }
    }

    if (sum >= price) {
      const change = sum - price;
      const changeCount = calculateChangeCoinCount(change);
      
      if (changeCount < minChangeCount) {
        minChangeCount = changeCount;
        // 新しい最小値なのでリセット
        bestCombinations = [currentCombination];
      } else if (changeCount === minChangeCount) {
        // 同じ最小お釣り枚数の別の組み合わせ
        bestCombinations.push(currentCombination);
      }
    }
  }

  // 重複パターンの除外 (例: [100, 100] が複数手持ちにある場合など)
  const uniqueAnswers = [];
  const seen = new Set();
  for (const combo of bestCombinations) {
    const sorted = [...combo].sort((a,b) => b - a);
    const key = sorted.join(',');
    if (!seen.has(key)) {
      seen.add(key);
      uniqueAnswers.push(sorted);
    }
  }

  return { minChangeCount, validAnswers: uniqueAnswers };
}

/**
 * ランダムに乱数を生成 [min, max]
 */
function rand(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

/**
 * 配列をシャッフル
 */
function shuffle(array) {
  const result = [...array];
  for (let i = result.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [result[i], result[j]] = [result[j], result[i]];
  }
  return result;
}

/**
 * 問題を生成する
 */
function generateProblem() {
  let price, wallet, solution;
  
  // 有効な問題ができるまでリトライ（代金以上支払えること保証）
  while (true) {
    let availableCoins = [...COIN_TYPES];
    
    if (state.mode === 'easy') {
      price = rand(2, 200) * 5; // 10〜1000円
      availableCoins = availableCoins.filter(c => c >= 5); // 1円玉を除く
    } else {
      price = rand(10, 3000);
    }
    
    // 財布の中身をランダムに作成（最大12枚程度に抑える）
    wallet = [];
    for (const type of availableCoins) {
      // 種類ごとにランダム枚数。高頻度なのは小銭
      let maxCount = 0;
      if (type >= 5000) maxCount = rand(0, 1);
      else if (type >= 500) maxCount = rand(0, 2);
      else if (type >= 50) maxCount = rand(0, 3);
      else maxCount = rand(0, 4);
      
      for(let i=0; i<maxCount; i++) {
        wallet.push(type);
      }
    }
    
    // 枚数制限 (パフォーマンス確保のため)
    if (wallet.length > 15) {
      wallet = shuffle(wallet).slice(0, 14);
    }

    const totalWallet = wallet.reduce((a,b)=>a+b, 0);
    if (totalWallet >= price) {
      // 解を計算
      solution = solveProblem(price, wallet);
      if (solution.validAnswers.length > 0) {
        break; // 妥当な問題完成
      }
    }
  }

  state.targetPrice = price;
  state.walletCoins = shuffle(wallet); // 毎回表示順を変える
  state.selectedIndices.clear();
  state.minChangeCoins = solution.minChangeCount;
  state.validAnswers = solution.validAnswers;

  renderProblem();
}

/**
 * 画面に問題を反映
 */
function renderProblem() {
  elPrice.textContent = state.targetPrice.toLocaleString();
  elSum.textContent = "0";
  elCoinsContainer.innerHTML = '';
  
  state.walletCoins.forEach((val, index) => {
    const btn = document.createElement('button');
    btn.className = `coin v-${val}`;
    if (val >= 1000) btn.classList.add('type-bill');
    btn.textContent = val >= 1000 ? `¥${val.toLocaleString()}` : val;
    btn.dataset.index = index;
    
    btn.addEventListener('click', () => toggleCoin(index, btn));
    elCoinsContainer.appendChild(btn);
  });
  
  updateSubmitBtn();
}

/**
 * 貨幣の選択/解除
 */
function toggleCoin(index, btnElement) {
  if (state.selectedIndices.has(index)) {
    state.selectedIndices.delete(index);
    btnElement.classList.remove('selected');
  } else {
    state.selectedIndices.add(index);
    btnElement.classList.add('selected');
  }
  
  updateSum();
}

/**
 * 合計額の更新
 */
function updateSum() {
  let sum = 0;
  state.selectedIndices.forEach(idx => {
    sum += state.walletCoins[idx];
  });
  elSum.textContent = sum.toLocaleString();
  updateSubmitBtn();
}

/**
 * イベントリスナー設定
 */
function setupEventListeners() {
  elBtnReset.addEventListener('click', () => {
    state.selectedIndices.clear();
    document.querySelectorAll('.coin').forEach(el => el.classList.remove('selected'));
    updateSum();
  });

  elBtnSubmit.addEventListener('click', submitAnswer);
  
  elBtnNext.addEventListener('click', () => {
    elModal.classList.remove('active');
    // 次の問題へ
    if (elBtnNext.textContent === 'もう一度遊ぶ') {
      state.score = 0;
      updateScore();
    }
    generateProblem();
  });
}

/**
 * 確定ボタンの状態更新
 */
function updateSubmitBtn() {
  // 選択が0枚の場合は無効化するなど(要件次第だが今回は常に押せるかクリック時に検証)
}

/**
 * トースト表示
 */
function showToast(msg) {
  elToast.textContent = msg;
  elToast.classList.add('show');
  setTimeout(() => elToast.classList.remove('show'), 2000);
}

/**
 * 解答の送信と判定
 */
function submitAnswer() {
  let sum = 0;
  const selectedValues = [];
  
  state.selectedIndices.forEach(idx => {
    const val = state.walletCoins[idx];
    sum += val;
    selectedValues.push(val);
  });

  if (sum < state.targetPrice) {
    showToast('代金に足りません');
    return;
  }

  const change = sum - state.targetPrice;
  const changeCount = calculateChangeCoinCount(change);
  
  // ユーザーの選択をソートして文字列化（比較用）
  selectedValues.sort((a,b) => b - a);
  const userStr = selectedValues.join(',');
  
  // 正解群に含まれているかチェック
  const isCorrect = state.validAnswers.some(ans => ans.join(',') === userStr);

  showResult(isCorrect, sum, change, changeCount);
}

/**
 * 結果の表示
 */
function showResult(isCorrect, sum, change, changeCount) {
  if (isCorrect) {
    state.score++;
    updateScore();
    elModalTitle.textContent = '正解！👏';
    elModalTitle.className = 'modal-title success';
    elBtnNext.textContent = '次の問題へ';
    
    // 正解時はシンプルに表示
    elResultDetails.innerHTML = `
      <div class="result-row"><span>支払額:</span> <span>${sum.toLocaleString()}円</span></div>
      <div class="result-row"><span>お釣り:</span> <span>${change.toLocaleString()}円 (${changeCount}枚)</span></div>
      <div class="result-row" style="margin-top: 1rem; text-align: center; color: var(--success); font-weight: bold;">
        お釣り枚数最小パーフェクト！
      </div>
    `;
    
    // 少し待ってから自動遷移させるか、モーダルを出すか。要件に従い即時または短い間。
    elModal.classList.add('active');
    
  } else {
    // 不正解
    elModalTitle.textContent = 'ゲームオーバー...';
    elModalTitle.className = 'modal-title error';
    elBtnNext.textContent = 'もう一度遊ぶ';
    
    const ansHtml = state.validAnswers[0].map(v => v >= 1000 ? `[${v}]` : `(${v})`).join(' ');
    
    elResultDetails.innerHTML = `
      <div class="result-row"><span>あなたの支払額:</span> <span>${sum.toLocaleString()}円</span></div>
      <div class="result-row"><span>お釣り枚数:</span> <span>${changeCount}枚</span></div>
      <div class="result-answer">
        <div><strong>【正解の組み合わせ例】</strong></div>
        <div style="margin-top:0.5rem; word-break: break-all;">${ansHtml}</div>
        <div style="margin-top:0.5rem; font-size: 0.85em; color: var(--text-muted);">
          ※お釣り枚数が ${state.minChangeCoins}枚 になる支払い方が正解です。
        </div>
      </div>
    `;
    elModal.classList.add('active');
  }
}

function updateScore() {
  elScore.textContent = state.score;
}

// 起動
init();

</script>
</body>
</html>
